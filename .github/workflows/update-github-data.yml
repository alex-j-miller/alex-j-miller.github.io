name: Update GitHub Data Cache

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-repos-cache:
    runs-on: ubuntu-latest
    env:
      GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME || github.repository_owner }}

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout -B "${{ github.ref_name }}" FETCH_HEAD

      - name: Fetch and transform repository data
        run: |
          mkdir -p public/data

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated" \
            | jq '[.[] | {name, description, html_url, stargazers_count, language, updated_at}]' \
            > public/data/repos.json

      - name: Commit updated cache
        run: |
          if git diff --quiet -- public/data/repos.json; then
            echo "No repository cache changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/repos.json
          git commit -m "chore(data): refresh GitHub repos cache"
          git push